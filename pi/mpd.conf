# /etc/mpd.conf  (Bada Bing coop — continuous shuffled classical over Bluetooth)
#
# Why MPD (and not an mpv/ffplay loop)?
#   For an UNATTENDED, headless, solar Pi the simplest *reliable* choice is MPD,
#   even though a one-line `mpv --shuffle --loop-playlist /music` looks simpler:
#     * MPD is a persistent DAEMON with built-in random + repeat (true gapless
#       continuous shuffle of the whole library), an on-the-fly database, and a
#       clean status API (`mpc current`, `mpc status`, `mpc idle player`). The
#       now-playing writer and any future controls (skip, pause) are then trivial
#       one-liners against `mpc` instead of parsing an mpv IPC socket.
#     * Crucially for Bluetooth: when the speaker drops and reconnects, MPD just
#       keeps the queue and resumes against the new default sink (via the Pulse
#       layer) — it does NOT need to be restarted. An mpv loop tends to die or
#       wedge when its audio sink vanishes mid-stream, forcing a full process
#       restart that loses position and re-shuffles awkwardly.
#     * MPD already ships an event/notification path (we use a tiny wrapper that
#       blocks on `mpc idle player` — see badabing-nowplaying.sh) so "tell other
#       scripts the current track" is first-class.
#   mpv would be fine for a quick demo; MPD is the lower-maintenance choice for a
#   box you never log into.
#
# This config assumes MPD outputs to PipeWire via the PulseAudio compat layer
# (the documented, working path when MPD runs as a system daemon and PipeWire
# runs as a system service). The default sink is whatever badabing-audio-route.sh
# pointed at the Bluetooth A2DP speaker — so MPD follows the speaker automatically.

# --- Paths -------------------------------------------------------------------
# MUST match MUSIC_DIR in badabing-music.env.
music_directory     "/srv/badabing/music"
playlist_directory  "/srv/badabing/playlists"
db_file             "/var/lib/mpd/database"
log_file            "/var/log/mpd/mpd.log"
pid_file            "/run/mpd/pid"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"

# Run as the mpd user (Debian's mpd package creates it). It must be in the
# 'audio' group; for the Pulse->PipeWire bridge it also needs to reach the
# system pipewire-pulse socket (handled via env in badabing-mpd.service).
user "mpd"

# Bind only to localhost + the local control socket. No remote control needed on
# a headless coop box; the socket is what `mpc` and our hook use.
bind_to_address "127.0.0.1"
bind_to_address "/run/mpd/socket"
port "6600"

# Rescan the library on startup so freshly-dropped files (or fetch-music.sh
# downloads) are picked up without a manual `mpc update`.
auto_update "yes"
auto_update_depth "10"

# Don't follow symlinks outside the library (safety on a network-exposed box).
follow_outside_symlinks "no"
follow_inside_symlinks "yes"

# --- Continuous shuffle ------------------------------------------------------
# The actual random+repeat flags are SET ONCE by badabing-mpd-init.sh after
# start; state_file (declared once above in the Paths block) persists them across
# reboots, and restore_paused (set once below) ensures we resume playing, not
# paused, on boot. NOTE: MPD rejects duplicate directives, so each of
# state_file / restore_paused / replaygain appears EXACTLY ONCE in this file.

# --- Audio output: PipeWire via PulseAudio compat ----------------------------
# type "pulse" routes into pipewire-pulse, which sends to the current DEFAULT
# sink — i.e. the Bluetooth A2DP speaker after badabing-audio-route.sh runs.
# We deliberately do NOT pin a `sink` here so MPD follows the default sink across
# Bluetooth reconnects (and across the USB-DAC fallback) with zero config churn.
audio_output {
    type        "pulse"
    name        "Bada Bing PipeWire (Bluetooth A2DP / default sink)"
    # server     "127.0.0.1"   # only if pipewire-pulse exposes a TCP listener
}

# Force a fixed output format so PipeWire/A2DP gets a stable rate (most SBC paths
# want 44100). This is the only place restore_paused is set:
audio_output_format "44100:16:2"
restore_paused "no"

# Resampler quality: keep it light on the Zero 2 W. We use libsamplerate's
# medium sinc converter (good quality, cheap enough for a single stereo stream on
# the Zero 2 W). If libmpdclient was built WITHOUT libsamplerate, comment this
# block out and MPD falls back to its built-in resampler.
resampler {
    plugin "libsamplerate"
    type   "Medium Sinc Interpolator"
}

# Replay gain so a Beethoven fortissimo and a quiet nocturne sit at similar
# loudness on an outdoor speaker (no one's there to ride the volume).
replaygain "auto"
replaygain_preamp "0"

# Keep MPD's own resource use modest.
max_connections "10"
connection_timeout "60"

# --- On-track-change hook ----------------------------------------------------
# MPD has no native "exec on song change" directive, so the hook is implemented
# as a tiny daemon (badabing-nowplaying.sh) that blocks on `mpc idle player` and
# writes the now-playing file on every change. That keeps the writer decoupled,
# crash-isolated, and independently restartable from MPD itself.
