# =============================================================================
# SSH hardening drop-in.
# Path on droplet: /etc/ssh/sshd_config.d/99-hardening.conf
# (Modern OpenSSH on Ubuntu 22.04+/24.04 reads sshd_config.d/*.conf. The drop-in
#  approach avoids editing the distro's main sshd_config.)
# Apply: sshd -t && systemctl reload ssh   (validate config BEFORE reloading!)
#
# WARNING: PasswordAuthentication is disabled below. Make sure your SSH PUBLIC
# KEY is already installed (cloud-init / Terraform ssh_keys does this) or you
# WILL lock yourself out.
# =============================================================================

# --- Authentication ----------------------------------------------------------
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
PermitEmptyPasswords no
# Only these users may SSH in. chickenadmin = interactive admin; coopstatus =
# the restricted rrsync deploy account the Pi pushes status.json through (its
# key is forced to rrsync via command=, so it still gets no shell). Omitting
# coopstatus here would silently BLOCK the status-push feature entirely.
AllowUsers chickenadmin coopstatus

# --- Reduce attack surface / harden the daemon -------------------------------
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
MaxAuthTries 3
MaxSessions 4
LoginGraceTime 20
ClientAliveInterval 300
ClientAliveCountMax 2
TCPKeepAlive no
UseDNS no

# --- Modern crypto only (drops legacy algos) ---------------------------------
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
HostKeyAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512,rsa-sha2-256
PubkeyAcceptedAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512,rsa-sha2-256

# --- Logging -----------------------------------------------------------------
LogLevel VERBOSE
