# =============================================================================
# nginx site for the chicken-cam public proxy.
# Path on droplet: /etc/nginx/sites-available/coop.conf
# Enable:  ln -s ../sites-available/coop.conf /etc/nginx/sites-enabled/
# Remove the default site:  rm -f /etc/nginx/sites-enabled/default
#
# Responsibilities:
#   * Terminate TLS (Let's Encrypt / certbot).
#   * Reverse-proxy LL-HLS  (-> 127.0.0.1:8888) and WebRTC/WHEP signaling
#     (-> 127.0.0.1:8889).
#   * Serve the static web viewer from /var/www/badabing.
#
# Security posture: the VIEWER IS PUBLIC -- there is intentionally NO login on
# the live stream or the status widget. Defense is the reverse-proxy itself:
#   * Viewers never talk to MediaMTX directly; nginx is the only public front
#     door (MediaMTX HLS/WHEP listen on loopback only).
#   * The ONLY authenticated party is the Pi PUBLISHING the stream, and that is
#     enforced by MediaMTX over the WireGuard tunnel -- not by nginx.
# If you ever want to gate the viewer behind a password, an OPT-IN Basic Auth
# block is provided below (commented out); re-enabling is two uncommented lines.
#
# NOTE: WebRTC *media* (SRTP) does NOT pass through nginx. Only the WHEP
# signaling POST/PATCH/DELETE goes here; media flows over UDP 8189 directly to
# the droplet's public IP (opened in ufw, advertised via webrtcAdditionalHosts).
# =============================================================================

# --- Redirect all HTTP to HTTPS (and let certbot answer ACME challenges) ---
server {
    listen 80;
    listen [::]:80;
    server_name cam.example.com;   # REPLACE with your domain

    # ACME HTTP-01 challenge (certbot --webroot or the nginx plugin).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Ubuntu 24.04 ships nginx 1.24, which does NOT support the standalone
    # `http2 on;` directive (that landed in nginx 1.25.1). Using it makes
    # `nginx -t` fail with "unknown directive http2" and nginx refuses to
    # start -- which on first boot also blocks `certbot --nginx`. Use the
    # legacy per-listener `http2` parameter, which works on 1.24 and is still
    # accepted (with a deprecation note) on 1.26+.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cam.example.com;   # REPLACE with your domain

    # --- TLS (managed by certbot; these paths are created by:
    #     certbot --nginx -d cam.example.com   OR
    #     certbot certonly --webroot -w /var/www/html -d cam.example.com ) ---
    ssl_certificate     /etc/letsencrypt/live/cam.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cam.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # HSTS commits browsers to HTTPS-only for this host for ~2 years, which is
    # hard to undo if anything is misconfigured. Leave it OFF by default and
    # enable only once you have confirmed HTTPS works end-to-end.
    # add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # --- Auth: the viewer is PUBLIC by design (no login on the stream or the
    #     status widget). OPT-IN Basic Auth: to require a password for ALL
    #     viewer access, create a user then uncomment the two directives below:
    #       sudo htpasswd -c /etc/nginx/.htpasswd_coop viewer
    #     (Note: /api/ is forced public via `auth_basic off;` in the included
    #      api-status.conf, so re-enabling here still leaves status.json open.)
    # auth_basic           "Chicken Cam";
    # auth_basic_user_file /etc/nginx/.htpasswd_coop;

    # Reasonable client limits.
    client_max_body_size 16m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # ----------------------------------------------------------------------
    # Static web viewer (index.html + app.js + styles.css) at the site root.
    # ----------------------------------------------------------------------
    root /var/www/badabing;
    index index.html;

    location = / {
        try_files /index.html =404;
    }
    location = /index.html {
        try_files /index.html =404;
    }
    location = /app.js {
        types { } default_type application/javascript;
        try_files /app.js =404;
    }
    location = /styles.css {
        types { } default_type text/css;
        try_files /styles.css =404;
    }

    # ----------------------------------------------------------------------
    # WebRTC / WHEP signaling for the coop path.
    # The WHEP endpoint is  /coop/whep  (POST offer, PATCH ICE, DELETE).
    # Also proxy the MediaMTX-served reader page assets under the path.
    # ----------------------------------------------------------------------
    location /coop/whep {
        # NOTE: do NOT add a per-location proxy_set_header here. In nginx,
        # proxy_set_header is all-or-nothing per context: a single directive in
        # this location would DISCARD every server-level header (Host,
        # X-Real-IP, X-Forwarded-For, X-Forwarded-Proto). MediaMTX's
        # webrtcTrustedProxies relies on X-Forwarded-For, so we inherit the full
        # server-level set instead of redefining anything here.
        proxy_pass http://127.0.0.1:8889/coop/whep;
        # WHEP uses POST/PATCH/DELETE; allow them and pass bodies through.
        proxy_buffering off;
        proxy_request_buffering off;
    }
    # (Optional) WHIP publish over the proxy is intentionally NOT exposed:
    # the Pi publishes via RTSP over WireGuard, so we block /whip from public.
    location /coop/whip {
        return 403;
    }

    # ----------------------------------------------------------------------
    # Low-Latency HLS for the coop path.
    # Manifest:      /coop/index.m3u8
    # Init/segments: /coop/*.mp4 / *.m4s, LL-HLS part requests, etc.
    # ----------------------------------------------------------------------
    location /coop/ {
        # (As above: no per-location proxy_set_header, so the server-level
        #  Host / X-Forwarded-* set is inherited rather than discarded.)
        proxy_pass http://127.0.0.1:8888/coop/;
        # LL-HLS uses HTTP/1.1 chunked + blocking playlist reload; no buffering.
        proxy_buffering off;
        proxy_cache off;
        # Allow the LL-HLS blocking requests to hang up to the part window.
        proxy_read_timeout 30s;
        # nginx add_header inheritance footgun: the moment ANY add_header appears
        # in a location, ALL server-level add_header directives are DROPPED for
        # that location. So we MUST re-declare the security headers here or the
        # HLS responses ship with no nosniff / Referrer-Policy.
        # HSTS stays OFF by default to match the server block above; if you
        # enable it there, uncomment it here too so the HLS responses match.
        # add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "no-cache" always;
    }

    # ----------------------------------------------------------------------
    # PUBLIC status JSON (coop health + now-playing), pushed by the Pi over
    # WireGuard into /var/www/badabing/api. The whole viewer is public, but this
    # snippet ALSO pins auth_basic OFF for /api/ so the health/now-playing widget
    # stays accessible even if you later opt in to Basic Auth on the stream above.
    # ----------------------------------------------------------------------
    include snippets/api-status.conf;

    # Deny anything else outright.
    location / {
        try_files $uri =404;
    }
}
