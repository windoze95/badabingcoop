# =============================================================================
# nginx snippet: PUBLIC status JSON endpoint for the coop viewer.
# Path on droplet: /etc/nginx/snippets/api-status.conf
#
# Include this INSIDE the relevant `server { ... }` block, e.g. in coop.conf:
#     include snippets/api-status.conf;
#
# Serves the Pi-pushed /var/www/badabing/api/status.json at  /api/status.json
# to anyone, with NO login (auth_basic off), short no-cache so the ~10-15s
# browser poll always gets fresh data, and a tiny edge cache to absorb bursts.
#
# WHY a separate, explicitly-public block: the viewer in coop.conf is public by
# default, but it ships an OPT-IN Basic Auth block an operator may someday
# enable. This snippet pins `auth_basic off` for /api/ so the health/now-playing
# widget stays public even then. status.json contains no secrets (uptime, temp,
# RSSI, battery %, current track) — keep it that way.
#
# The droplet runs NO application server. nginx only serves this static file,
# which the Pi rsyncs in over WireGuard. There is no inbound path to the home
# network anywhere in this config.
# =============================================================================

# Static API root (the Pi pushes here via the rrsync-locked coopstatus account).
# Using a dedicated root keeps it independent of the site's video web root.
#
# IMPORTANT: we use `root`, NOT `alias`. nginx has a long-standing bug
# (trac #97 / #733) where `try_files $uri` inside an aliased location can fail
# because $uri still carries the location prefix that the alias path doesn't.
# With `root /var/www/badabing;` the request /api/status.json maps cleanly to
# /var/www/badabing/api/status.json and try_files behaves correctly.
location /api/ {
    # PUBLIC: no login for the status widget.
    auth_basic off;

    root /var/www/badabing;

    # JSON content type + sane charset.
    default_type application/json;
    charset utf-8;

    # Only ever serve files that exist; never list the directory, never proxy.
    autoindex off;
    try_files $uri =404;

    # Freshness: the browser polls every ~10-15s and must see the latest push.
    # no-store would also work; no-cache + must-revalidate lets the conditional
    # GET (ETag/Last-Modified) save bytes while never serving stale data.
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires off;
    etag on;

    # The viewer is same-origin, but allow simple cross-origin GETs in case the
    # page is ever hosted elsewhere (harmless for public, read-only JSON).
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    # Keep the site-wide hardening headers explicit here too (add_header does NOT
    # inherit into a location once this location defines its own add_headers).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Cheap CORS preflight short-circuit (not needed for same-origin GET, but
    # correct if a cross-origin client ever sends one).
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Max-Age 600 always;
        add_header Content-Length 0;
        add_header Content-Type "text/plain";
        return 204;
    }
}

# Defensive: never let anyone fetch the staging/placeholder by another name or
# walk the directory. (root + try_files above already prevents listing; this is
# belt-and-suspenders against a stray future location.)
location = /api/ {
    auth_basic off;
    return 404;
}
