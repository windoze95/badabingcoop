# =============================================================================
# WireGuard server config for the DigitalOcean chicken-cam proxy droplet.
# Path on droplet: /etc/wireguard/wg0.conf  (chmod 600, owned by root)
#
# Topology:
#   Droplet (this host)  10.10.0.1/24   <-- public proxy
#   Raspberry Pi (Pi)    10.10.0.2/32   <-- pushes RTSP over the tunnel only
#
# The Pi dials OUT to the droplet on UDP 51820. The home router needs NO
# port-forwarding. MediaMTX binds its RTSP listener to 10.10.0.1 ONLY, so the
# Pi's RTSP push is reachable exclusively over this encrypted interface.
#
# Generate keys (do NOT reuse the placeholders below):
#   wg genkey | tee server_private.key | wg pubkey > server_public.key
#   wg genkey | tee pi_private.key     | wg pubkey > pi_public.key
# Put the SERVER private key here, the PI public key in [Peer].
# =============================================================================

[Interface]
# Tunnel address of the droplet.
Address = 10.10.0.1/24
ListenPort = 51820

# Server private key (REPLACE with contents of server_private.key).
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY

# Lock down the config file's permissions on creation.
SaveConfig = false

# We deliberately do NOT add iptables MASQUERADE/forwarding rules here.
# The droplet is a media endpoint, not a gateway: the Pi only needs to reach
# 10.10.0.1 (MediaMTX RTSP), and the droplet only needs to reach 10.10.0.2 if
# you ever want to pull instead of push. No IP forwarding is enabled.

[Peer]
# --- Raspberry Pi chicken-cam ---
# Pi public key (REPLACE with contents of pi_public.key).
PublicKey = REPLACE_WITH_PI_PUBLIC_KEY

# Optional but recommended: pre-shared key for post-quantum-ish hardening.
# Generate with: wg genpsk
# PresharedKey = REPLACE_WITH_PRESHARED_KEY

# The Pi is the only peer; restrict it to its single tunnel IP.
AllowedIPs = 10.10.0.2/32

# The droplet does not know the Pi's roaming public IP ahead of time; the Pi
# sets PersistentKeepalive on its side so the NAT mapping stays open.
