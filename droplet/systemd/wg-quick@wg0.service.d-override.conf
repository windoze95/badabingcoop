# =============================================================================
# systemd drop-in OVERRIDE for the WireGuard interface unit.
#
# WireGuard ships a templated unit  wg-quick@.service  with the wireguard-tools
# package. You do NOT replace it; you enable the instance for wg0 and (optionally)
# layer this drop-in on top for restart resilience.
#
# Install:
#   mkdir -p /etc/systemd/system/wg-quick@wg0.service.d
#   cp wg-quick@wg0.service.d-override.conf \
#        /etc/systemd/system/wg-quick@wg0.service.d/override.conf
#   systemctl daemon-reload
#   systemctl enable --now wg-quick@wg0
#
# Verify:  wg show   and   systemctl status wg-quick@wg0
# =============================================================================
[Unit]
# Make sure the tunnel comes up only once the network stack is online.
After=network-online.target nss-lookup.target
Wants=network-online.target

[Service]
# The packaged unit is Type=oneshot RemainAfterExit=yes. Add a bounded retry so
# a transient failure at boot (e.g. eth0 not ready) doesn't leave us with no
# tunnel -- which would also prevent MediaMTX from binding to 10.10.0.1.
Restart=on-failure
RestartSec=5
